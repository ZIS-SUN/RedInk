name: Build and Push Docker Image

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

env:
  DOCKER_USERNAME: histonemax
  IMAGE_NAME: redink

jobs:
  # 发布前先过统一质量门（后端测试 + 前端 lint/test/typecheck/build + 依赖审计），失败不发布镜像
  quality:
    uses: ./.github/workflows/quality.yml

  build-and-push:
    runs-on: ubuntu-latest
    needs: quality
    env:
      # Fork 通常没有上游 Docker Hub 凭据：无密钥时仍完成镜像构建验证，
      # 但跳过登录与推送；配置密钥的正式仓库保持原发布行为。
      DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}

    steps:
      - name: Checkout 代码
        uses: actions/checkout@v4

      - name: 设置 Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 登录 Docker Hub
        if: env.DOCKER_PASSWORD != ''
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKER_USERNAME }}
          password: ${{ env.DOCKER_PASSWORD }}

      - name: 提取 Docker 元数据
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: 构建 Docker 镜像（有凭据时推送）
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: ${{ env.DOCKER_PASSWORD != '' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: 输出镜像信息
        run: |
          echo "Docker 镜像构建成功！"
          echo "镜像标签："
          echo "${{ steps.meta.outputs.tags }}"
          if [ -n "$DOCKER_PASSWORD" ]; then
            echo "Docker Hub 凭据已配置，镜像已推送。"
          else
            echo "未配置 DOCKER_PASSWORD：已完成构建验证，按设计跳过登录与推送。"
          fi
