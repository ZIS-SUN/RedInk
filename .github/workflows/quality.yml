name: Quality Gate

# 可复用质量门（workflow_call）：供 checks / release / docker-publish 统一调用，
# 步骤细节（版本、安装命令）与原 checks.yml 保持一致，避免多处维护漂移。
# 无需 inputs / secrets：三个 job 均只需只读 checkout。
on:
  workflow_call:

jobs:
  backend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install backend dependencies
        run: uv sync --locked

      - name: Run backend tests
        run: uv run pytest -q

      - name: Compile backend modules
        run: uv run python -m py_compile backend/errors.py backend/routes/*.py backend/generators/*.py backend/services/*.py

  frontend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Set up pnpm
        run: npm install -g pnpm@10.19.0

      - name: Install frontend dependencies
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Lint frontend
        working-directory: frontend
        run: pnpm lint

      - name: Run frontend tests
        working-directory: frontend
        run: pnpm test

      - name: Typecheck frontend
        working-directory: frontend
        run: pnpm typecheck

      - name: Build frontend
        working-directory: frontend
        run: pnpm build

  # 前端生产依赖安全审计：发现 high 及以上漏洞即失败（门禁失败）。
  # pnpm audit 仅依据 pnpm-lock.yaml 向 registry 查询，无需安装 node_modules。
  frontend-audit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Set up pnpm
        run: npm install -g pnpm@10.19.0

      - name: Audit frontend production dependencies
        working-directory: frontend
        run: pnpm audit --prod --registry=https://registry.npmjs.org --audit-level=high
