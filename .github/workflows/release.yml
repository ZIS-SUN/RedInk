name: Release

on:
  push:
    tags:
      - 'v*'

# 最小权限：仅发布 Release 的 job 提升为 contents: write
permissions:
  contents: read

# 同一 tag 不重复跑；发布中途不取消，避免出现残缺的 Release
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # job 0：统一质量门（后端测试 + 前端 lint/test/typecheck/build + 依赖审计），失败则不发版
  quality:
    uses: ./.github/workflows/quality.yml

  # job 1：校验 tag 版本与 pyproject.toml / frontend/package.json / redink.spec 一致
  verify-version:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: 校验版本一致性
        run: python3 scripts/check-version.py "${GITHUB_REF_NAME}"

  # job 2：macOS 构建 RedInk.app 并打包 DMG（复用本地构建脚本，产物为 ad-hoc 签名，无需证书）
  build-macos:
    runs-on: macos-latest
    needs: [quality, verify-version]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Set up pnpm
        run: npm install -g pnpm@10.19.0

      - name: Install backend dependencies
        run: uv sync --locked

      - name: 构建 RedInk.app
        run: bash scripts/build-macos-app.sh

      - name: 打包 DMG
        # macOS runner 上 hdiutil create 偶发 "resource busy"，重试最多 3 次
        run: |
          for attempt in 1 2 3; do
            if bash scripts/make-dmg.sh; then
              exit 0
            fi
            echo "make-dmg.sh 第 ${attempt} 次尝试失败，稍后重试..."
            sleep 10
          done
          echo "make-dmg.sh 连续 3 次失败" >&2
          exit 1

      - name: 重命名产物（带版本号）
        run: mv dist/RedInk.dmg "dist/RedInk-${GITHUB_REF_NAME}.dmg"

      - name: 上传 DMG 产物
        uses: actions/upload-artifact@v4
        with:
          name: redink-dmg
          path: dist/RedInk-*.dmg
          if-no-files-found: error

  # job 3：git-cliff 生成 changelog，创建 GitHub Release 并附上 DMG
  release:
    runs-on: ubuntu-latest
    needs: [quality, verify-version, build-macos]
    permissions:
      contents: write

    steps:
      - name: Checkout（全量历史，供 git-cliff 计算上个 tag 以来的提交）
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: 下载 DMG 产物
        uses: actions/download-artifact@v4
        with:
          name: redink-dmg
          path: dist

      - name: 生成 changelog（git-cliff，配置见 cliff.toml）
        run: uvx --from 'git-cliff>=2,<3' git-cliff --current -o release-notes.md

      - name: 创建 GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            dist/RedInk-*.dmg \
            --title "RedInk ${GITHUB_REF_NAME}" \
            --notes-file release-notes.md \
            --verify-tag
