# git-cliff 配置：从 conventional commits 生成中文分组 changelog
# 文档：https://git-cliff.org/docs/configuration
# 本地预览：uvx git-cliff --unreleased

[changelog]
header = ""
# 分组标题里的 <!-- N --> 注释仅用于控制排序，渲染时被 striptags 移除
body = """
{% if version %}\
## {{ version | trim_start_matches(pat="v") }} ({{ timestamp | date(format="%Y-%m-%d") }})
{% else %}\
## 未发布
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | striptags | trim }}
{% for commit in commits %}
- {% if commit.scope %}**{{ commit.scope }}**: {% endif %}{{ commit.message }} ({{ commit.id | truncate(length=7, end="") }})
{%- endfor %}
{% endfor %}
"""
trim = true

[git]
conventional_commits = true
# 历史里存在少量非严格 conventional 的提交（如 ci+docs:），保留并归入下方兜底分组
filter_unconventional = false
protect_breaking_commits = true
commit_parsers = [
  { message = "^feat", group = "<!-- 0 -->新功能" },
  { message = "^fix", group = "<!-- 1 -->修复" },
  { message = "^perf", group = "<!-- 2 -->性能" },
  { message = "^refactor", group = "<!-- 3 -->重构" },
  { message = "^docs", group = "<!-- 4 -->文档" },
  { message = "^style", group = "<!-- 5 -->样式" },
  { message = "^test", group = "<!-- 6 -->测试" },
  { message = "^(build|ci)", group = "<!-- 7 -->构建与 CI" },
  { message = "^chore", group = "<!-- 8 -->杂项" },
  { message = ".*", group = "<!-- 9 -->其他" },
]
filter_commits = false
topo_order = false
sort_commits = "oldest"
